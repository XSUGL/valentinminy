<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аришенька 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;opacity:0;pointer-events:none;
  transition:opacity .9s cubic-bezier(.4,0,.2,1);z-index:10;}
.screen.active{opacity:1;pointer-events:all;}

/* ══ S1: HEART ══ */
#s1{
  background:linear-gradient(145deg,#fff0f4 0%,#fde4ec 50%,#f8cdd8 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
}
#petal-canvas{position:absolute;inset:0;pointer-events:none;}
.s1-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;padding:2rem;}

.arisha-title{
  font-family:'Sacramento',cursive;
  font-size:clamp(3.2rem,13vw,6rem);
  color:#b84d6a;
  text-shadow:0 3px 30px rgba(184,77,106,.3);
  line-height:1;
  animation:fadeSlideUp .9s ease both;
}
.subtitle{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(.6rem,.2rem + 2vw,.78rem);
  letter-spacing:.25em;text-transform:uppercase;
  color:#c8708a;opacity:.7;
  margin-top:.4rem;
  animation:fadeSlideUp .9s .15s ease both;
}

/* HEART */
.heart-wrap{position:relative;display:flex;align-items:center;justify-content:center;animation:fadeSlideUp .9s .25s ease both;}
.heart-ripple{
  position:absolute;width:140px;height:140px;border-radius:50%;
  border:2px solid rgba(232,131,154,.4);
  animation:ripple 2s ease-out infinite;
}
.heart-ripple:nth-child(2){animation-delay:.7s;}
.heart-ripple:nth-child(3){animation-delay:1.4s;}
.heart-svg-btn{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
  -webkit-tap-highlight-color:transparent;
  animation:heartPulse 1.6s ease-in-out infinite;
  filter:drop-shadow(0 8px 32px rgba(184,77,106,.55));
}
.heart-svg-btn:active .heart-svg{transform:scale(.88);}
.heart-svg{transition:transform .12s;width:clamp(100px,28vw,160px);height:auto;}

.tap-hint{
  font-family:'Montserrat',sans-serif;
  font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;
  color:#c45c78;
  animation:fadeSlideUp .9s .4s ease both, breathe 2.2s 1.3s ease-in-out infinite;
}

/* ══ S2: MAP ══ */
#s2{background:#0f1923;}
#map{position:absolute;inset:0;z-index:1;}

/* Custom map style overlay */
#map-overlay{
  position:absolute;inset:0;z-index:400;pointer-events:none;
}

/* Top bar */
.flight-bar{
  position:absolute;top:0;left:0;right:0;z-index:500;
  background:linear-gradient(180deg,rgba(15,25,35,.95) 0%,rgba(15,25,35,.0) 100%);
  padding:1rem 1.5rem 2.5rem;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  pointer-events:none;
}
.flight-label{
  font-family:'Montserrat',sans-serif;
  font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.5);
}
.flight-cities{
  font-family:'Sacramento',cursive;
  font-size:clamp(1.8rem,7vw,3rem);color:#ffd6e7;
  text-shadow:0 2px 16px rgba(255,150,180,.4);
}

/* Bottom status */
.flight-status-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:500;
  background:linear-gradient(0deg,rgba(15,25,35,.95) 0%,rgba(15,25,35,.0) 100%);
  padding:2rem 1.5rem 1.2rem;
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  pointer-events:none;
}
.progress-track{
  width:min(280px,80vw);height:3px;
  background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#e8839a,#ff9eb5);
  border-radius:99px;width:0%;transition:width .1s linear;
}
#flight-status-text{
  font-family:'Montserrat',sans-serif;
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
}

/* TELEGRAM PLANE */
#tg-plane{
  position:absolute;z-index:600;pointer-events:none;
  transform:translate(-50%,-50%);
  will-change:transform,left,top;
}
.tg-plane-svg{
  width:clamp(36px,8vw,52px);
  filter:drop-shadow(0 4px 16px rgba(255,180,200,.7));
}

/* TRAIL */
.flight-trail{position:absolute;inset:0;z-index:300;pointer-events:none;}

/* ══ S3: RAIN + LOVE ══ */
#s3{
  background:linear-gradient(145deg,#fff0f4 0%,#fde4ec 55%,#f8cdd8 100%);
  display:flex;align-items:center;justify-content:center;
}
#rain-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;}
.s3-wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.8rem;padding:2rem 1.5rem;width:100%;min-height:100vh;
}

.love-card{
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(232,131,154,.25);
  border-radius:24px;
  padding:2rem 2rem;
  box-shadow:0 8px 40px rgba(184,77,106,.12);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s,box-shadow .12s;
  max-width:min(480px,90vw);
  width:100%;
  position:relative;overflow:hidden;
}
.love-card::before{
  content:'"';
  position:absolute;top:-1rem;left:1rem;
  font-family:'Sacramento',cursive;font-size:7rem;
  color:rgba(232,131,154,.1);line-height:1;pointer-events:none;
}
.love-card:active{transform:scale(.97);box-shadow:0 4px 20px rgba(184,77,106,.1);}

.love-text{
  font-family:'Sacramento',cursive;
  font-size:clamp(2rem,8vw,3.2rem);
  color:#b84d6a;
  text-align:center;line-height:1.35;
  min-height:2.8em;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;
}

.tap-love-hint{
  font-family:'Montserrat',sans-serif;
  font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;
  color:#c45c78;opacity:.7;
  animation:breathe 2.2s ease-in-out infinite;
}

.music-pill{
  display:flex;align-items:center;gap:.9rem;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(232,131,154,.2);
  border-radius:50px;padding:.6rem 1.2rem .6rem .6rem;
  box-shadow:0 4px 16px rgba(184,77,106,.1);
}
.music-btn{
  background:linear-gradient(135deg,#e8839a,#c45c78);
  border:none;color:white;width:42px;height:42px;border-radius:50%;
  font-size:1.1rem;cursor:pointer;
  box-shadow:0 3px 14px rgba(196,92,120,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;
}
.music-btn:active{transform:scale(.9);}
.music-info{display:flex;flex-direction:column;}
.music-track{font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:400;color:#b84d6a;letter-spacing:.05em;}
.music-artist{font-family:'Montserrat',sans-serif;font-size:.55rem;color:#c8708a;opacity:.7;letter-spacing:.05em;}

/* FLOATERS */
.float-el{position:fixed;pointer-events:none;z-index:9999;
  animation:floatUp 2.8s cubic-bezier(.2,1,.3,1) forwards;}

/* BURST */
.burst-el{position:fixed;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  animation:burstGo 1.4s cubic-bezier(.2,1,.3,1) forwards;}

/* CITY PIN */
.city-pin{
  background:rgba(255,255,255,.95);
  border:2px solid #e8839a;
  border-radius:20px;padding:.25rem .6rem;
  font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:400;
  color:#b84d6a;white-space:nowrap;
  box-shadow:0 2px 12px rgba(184,77,106,.3);
}

/* ── KEYFRAMES ── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes heartPulse{0%,100%{transform:scale(1)}35%{transform:scale(1.1)}65%{transform:scale(1.05)}}
@keyframes ripple{0%{transform:scale(.8);opacity:.7}100%{transform:scale(2);opacity:0}}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translateY(-220px) scale(.4) rotate(20deg)}}
@keyframes burstGo{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.6)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(3)}
}
@keyframes planeFly{0%{filter:drop-shadow(0 4px 16px rgba(255,180,200,.7))}
  50%{filter:drop-shadow(0 6px 24px rgba(255,180,200,1))}
  100%{filter:drop-shadow(0 4px 16px rgba(255,180,200,.7))}}
</style>
</head>
<body>

<!-- ══ SCREEN 1 ══ -->
<div class="screen active" id="s1">
  <canvas id="petal-canvas"></canvas>
  <div class="s1-wrap">
    <div>
      <div class="arisha-title">Аришенька</div>
      <div class="subtitle">моё солнышко</div>
    </div>

    <div class="heart-wrap">
      <div class="heart-ripple"></div>
      <div class="heart-ripple"></div>
      <div class="heart-ripple"></div>
      <button class="heart-svg-btn" id="heart-btn" onclick="startFlight()">
        <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="hg" cx="50%" cy="35%" r="60%">
              <stop offset="0%" stop-color="#ff8fab"/>
              <stop offset="60%" stop-color="#e8839a"/>
              <stop offset="100%" stop-color="#c45c78"/>
            </radialGradient>
            <filter id="hglow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <path fill="url(#hg)" filter="url(#hglow)"
            d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C36 5 43 9 50 17 C57 9 64 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z"/>
          <!-- shine -->
          <ellipse cx="35" cy="22" rx="10" ry="6" fill="rgba(255,255,255,.35)" transform="rotate(-30,35,22)"/>
        </svg>
      </button>
    </div>

    <div class="tap-hint">нажми на сердечко</div>
  </div>
</div>

<!-- ══ SCREEN 2: MAP ══ -->
<div class="screen" id="s2">
  <div id="map"></div>

  <div class="flight-bar">
    <div class="flight-label">маршрут любви</div>
    <div class="flight-cities">Santa Severa ✈ Павлоград</div>
  </div>

  <!-- Telegram-style plane SVG -->
  <div id="tg-plane">
    <svg class="tg-plane-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f0c8d8"/>
        </linearGradient>
        <filter id="pglow">
          <feGaussianBlur stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Main fuselage -->
      <path fill="url(#pg)" filter="url(#pglow)"
        d="M8 32 L52 20 C56 19 58 21 57 25 L48 38 C47 40 44 41 42 40 L30 35 L20 46 L16 44 L22 32 L8 32Z"/>
      <!-- Wing -->
      <path fill="rgba(255,255,255,.85)"
        d="M20 32 L38 26 L42 32 L28 36Z"/>
      <!-- Tail -->
      <path fill="rgba(255,255,255,.7)"
        d="M8 32 L14 28 L18 32 L14 36Z"/>
      <!-- Window -->
      <circle cx="40" cy="30" r="2.5" fill="rgba(255,182,200,.9)"/>
      <!-- Engine glow -->
      <ellipse cx="44" cy="36" rx="4" ry="2" fill="rgba(255,150,180,.4)"/>
    </svg>
  </div>

  <div class="flight-status-bar">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="flight-status-text">готовимся к взлёту...</div>
  </div>
</div>

<!-- ══ SCREEN 3 ══ -->
<div class="screen" id="s3">
  <canvas id="rain-canvas"></canvas>
  <div class="s3-wrap">

    <div class="love-card" id="love-card" onclick="addLove()">
      <div class="love-text" id="love-text">я тебя люблю ❤️</div>
    </div>

    <div class="tap-love-hint">нажимай — добавляй любви</div>

    <div class="music-pill">
      <button class="music-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
      <div class="music-info">
        <span class="music-track">Can't Take My Eyes Off You</span>
        <span class="music-artist">Frankie Valli</span>
      </div>
    </div>

  </div>
</div>

<!-- SOUNDCLOUD -->
<iframe id="sc-iframe"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/frankievalli/cant-take-my-eyes-off-you&color=%23e8839a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_teaser=false"
  style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;"
  allow="autoplay">
</iframe>

<script>
// ════════════════════════════════════════
// PETALS
// ════════════════════════════════════════
const pc=document.getElementById('petal-canvas');
const px=pc.getContext('2d');
function resPC(){pc.width=innerWidth;pc.height=innerHeight;}
resPC();addEventListener('resize',resPC);
const petals=[];
function mkPetal(){
  return{x:Math.random()*pc.width,y:-20,
    sz:6+Math.random()*14,sy:.6+Math.random()*1.4,sx:(Math.random()-.5)*.9,
    rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.035,op:.3+Math.random()*.55,
    col:['#f7c5d0','#e8839a','#fce4ec','#f9aec0','#fddde6','#ffb3c6'][0|Math.random()*6]};
}
for(let i=0;i<32;i++){const p=mkPetal();p.y=Math.random()*innerHeight;petals.push(p);}
(function animPetals(){
  px.clearRect(0,0,pc.width,pc.height);
  petals.forEach(p=>{
    p.y+=p.sy;p.x+=p.sx+Math.sin(p.y*.018)*.6;p.rot+=p.rs;
    if(p.y>pc.height+20)Object.assign(p,mkPetal());
    px.save();px.translate(p.x,p.y);px.rotate(p.rot);
    px.globalAlpha=p.op;px.fillStyle=p.col;
    px.beginPath();px.ellipse(0,0,p.sz/2.2,p.sz,0,0,Math.PI*2);
    px.fill();px.restore();
  });
  requestAnimationFrame(animPetals);
})();

// ════════════════════════════════════════
// SCREENS
// ════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ════════════════════════════════════════
// FLOATERS
// ════════════════════════════════════════
function spawnF(x,y,n,big){
  const em=['❤️','🩷','💕','💗','🌸','✨','💖','💝'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='float-el';
      const sz=big?(1.5+Math.random()*2):(.7+Math.random()*1.3);
      el.textContent=em[0|Math.random()*em.length];
      el.style.cssText=`left:${x+(Math.random()-.5)*80}px;top:${y+(Math.random()-.5)*40}px;font-size:${sz}rem;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2900);
    },i*55);
  }
}

// ════════════════════════════════════════
// MAP & FLIGHT
// ════════════════════════════════════════
// Santa Severa, Italy
const FROM_LAT=42.044, FROM_LNG=11.951, FROM_NAME='Santa Severa 🇮🇹';
// Pavlograd, Ukraine
const TO_LAT=48.537,   TO_LNG=35.870,   TO_NAME='Павлоград 🇺🇦';

let map=null, planeEl=null, trailLine=null;
let flightRaf=null, flightT=0;
let trailLatLngs=[];
let mapInited=false;

function initMap(){
  if(mapInited)return;
  mapInited=true;

  map=L.map('map',{
    zoomControl:false,attributionControl:false,
    dragging:false,scrollWheelZoom:false,doubleClickZoom:false,
    touchZoom:false,keyboard:false,
  });

  // Carto Dark (no labels) — sleek dark map like Telegram
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19
  }).addTo(map);

  // Pink city labels only
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19,opacity:.5
  }).addTo(map);

  // Fit view: center between cities, zoom out enough
  const bounds=L.latLngBounds([FROM_LAT,FROM_LNG],[TO_LAT,TO_LNG]);
  map.fitBounds(bounds,{padding:[80,80]});

  // City pins
  const pinIcon=(label)=>L.divIcon({
    className:'',
    html:`<div class="city-pin">${label}</div>`,
    iconAnchor:[0,10],
  });
  L.marker([FROM_LAT,FROM_LNG],{icon:pinIcon(FROM_NAME)}).addTo(map);
  L.marker([TO_LAT,TO_LNG],  {icon:pinIcon(TO_NAME)}).addTo(map);

  // Dotted trail line (will be updated)
  trailLine=L.polyline([],{
    color:'#ff9eb5',weight:2.5,opacity:.7,
    dashArray:'6 5'
  }).addTo(map);

  planeEl=document.getElementById('tg-plane');
}

// Great-circle interpolation
function interpolate(t){
  const lat=FROM_LAT+(TO_LAT-FROM_LAT)*t;
  const lng=FROM_LNG+(TO_LNG-FROM_LNG)*t;
  // arc: max altitude at t=0.5
  const arcLat=lat + Math.sin(t*Math.PI)*6;
  return [arcLat,lng];
}

function eio(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

const STATUSES=[
  [0,'готовимся к взлёту... 🛫'],
  [.1,'взлетаем! 🛫'],
  [.25,'пролетаем над Апеннинами 🏔️'],
  [.45,'Адриатическое море внизу 🌊'],
  [.6,'входим в воздушное пространство Украины 💙💛'],
  [.8,'снижаемся... Павлоград уже близко 🌸'],
  [.95,'приземляемся... 💕'],
];

function getStatus(t){
  let s=STATUSES[0][1];
  for(const [thresh,txt] of STATUSES) if(t>=thresh) s=txt;
  return s;
}

function doFlight(){
  if(flightT>1){
    cancelAnimationFrame(flightRaf);
    document.getElementById('flight-status-text').textContent='приземлились! 💕';
    document.getElementById('prog-fill').style.width='100%';
    setTimeout(()=>{
      // BIG BURST
      const b=document.createElement('div');
      b.className='burst-el';b.textContent='💖';b.style.left='50%';b.style.top='50%';
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),1500);
      spawnF(innerWidth/2,innerHeight/2,22,true);
      setTimeout(()=>showScreen('s3'),2000);
    },400);
    return;
  }

  const t=eio(Math.min(flightT,1));
  const [lat,lng]=interpolate(t);
  const pt=map.latLngToContainerPoint([lat,lng]);

  // Update plane position
  planeEl.style.left=pt.x+'px';
  planeEl.style.top=pt.y+'px';

  // Plane rotation: angle to next point
  if(flightT<.98){
    const t2=Math.min(flightT+.01,1);
    const [lat2,lng2]=interpolate(eio(t2));
    const pt2=map.latLngToContainerPoint([lat2,lng2]);
    const angle=Math.atan2(pt2.y-pt.y,pt2.x-pt.x)*(180/Math.PI);
    planeEl.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;
  }

  // Trail
  trailLatLngs.push([lat,lng]);
  trailLine.setLatLngs(trailLatLngs);

  // Progress
  document.getElementById('prog-fill').style.width=(t*100)+'%';
  document.getElementById('flight-status-text').textContent=getStatus(t);

  flightT+=.0025;
  flightRaf=requestAnimationFrame(doFlight);
}

let prevT=0;
function animSmooth(ts){
  const dt=Math.min((ts-prevT)/16,3);
  prevT=ts;
  // handled by doFlight
}

function startFlight(){
  const hb=document.getElementById('heart-btn').getBoundingClientRect();
  spawnF(hb.left+hb.width/2,hb.top+hb.height/2,10);

  showScreen('s2');
  initMap();

  trailLatLngs=[];flightT=0;
  trailLine&&trailLine.setLatLngs([]);
  document.getElementById('prog-fill').style.width='0%';

  // Place plane at start
  setTimeout(()=>{
    const pt=map.latLngToContainerPoint([FROM_LAT,FROM_LNG]);
    planeEl.style.left=pt.x+'px';
    planeEl.style.top=pt.y+'px';
    planeEl.style.transform='translate(-50%,-50%) rotate(0deg)';
    planeEl.style.opacity='1';
    setTimeout(()=>{ prevT=performance.now(); doFlight(); },600);
  },300);
}

// HEART RAIN
// ════════════════════════════════════════
const rc=document.getElementById('rain-canvas');
const rx=rc.getContext('2d');
let rainOn=false,rain=[];
function resRC(){rc.width=innerWidth;rc.height=innerHeight;}
resRC();addEventListener('resize',resRC);

function mkRain(){
  return{
    x:Math.random()*rc.width,y:-35,
    sz:.8+Math.random()*1.6,speed:1.6+Math.random()*2.6,
    wb:Math.random()*Math.PI*2,ws:.016+Math.random()*.024,
    op:.55+Math.random()*.4,
    em:['❤️','💕','💗','🩷','💖','💝'][0|Math.random()*6]
  };
}

let rainSpawnCount=0;
function spawnRain(){
  rain.push(mkRain());
  rainSpawnCount++;
  const delay=rainSpawnCount<60?65:110;
  if(rainOn)setTimeout(spawnRain,delay);
}

(function animRain(){
  if(rainOn){
    rx.clearRect(0,0,rc.width,rc.height);
    rain.forEach(h=>{
      h.y+=h.speed;h.wb+=h.ws;h.x+=Math.sin(h.wb)*.7;
      rx.globalAlpha=h.op;
      rx.font=`${(h.sz*26)|0}px serif`;
      rx.fillText(h.em,h.x,h.y);
    });
    rx.globalAlpha=1;
    rain=rain.filter(h=>h.y<rc.height+50);
  }
  requestAnimationFrame(animRain);
})();

const s3=document.getElementById('s3');
new MutationObserver(()=>{
  if(s3.classList.contains('active')&&!rainOn){
    rainOn=true;
    rainSpawnCount=0;
    spawnRain();
  }
}).observe(s3,{attributes:true,attributeFilter:['class']});

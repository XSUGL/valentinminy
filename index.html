<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Аришенька 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff5f7;font-family:'Cormorant Garamond',serif;}

.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;z-index:10;}
.screen.active{opacity:1;pointer-events:all;}

/* ── SCREEN 1 ── */
#s1{background:linear-gradient(160deg,#fff0f4,#fde4ec,#f9cdd8);flex-direction:column;gap:1.5rem;}
#petals-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
.s1-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.8rem;}
.title-script{
  font-family:'Sacramento',cursive;
  font-size:clamp(3rem,12vw,5.5rem);
  color:#c45c78;text-shadow:0 2px 20px rgba(196,92,120,.25);
  text-align:center;animation:fadeUp 1s ease both;
}
.heart-btn{
  background:none;border:none;cursor:pointer;
  font-size:clamp(6rem,22vw,9rem);
  animation:hb 1.6s ease-in-out infinite, fadeUp 1s .2s ease both;
  filter:drop-shadow(0 6px 24px rgba(196,92,120,.5));
  transition:transform .1s;user-select:none;-webkit-tap-highlight-color:transparent;
}
.heart-btn:active{transform:scale(.88);}
.tap-hint{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;
  color:#c45c78;opacity:.7;animation:pulse 2s ease-in-out infinite;}

/* ── SCREEN 2: MAP ── */
#s2{background:#0d1b2a;flex-direction:column;}
#map-canvas{position:absolute;inset:0;width:100%;height:100%;}
.map-header{position:absolute;top:1.2rem;left:50%;transform:translateX(-50%);
  z-index:5;text-align:center;color:white;}
.map-route{font-family:'Sacramento',cursive;font-size:clamp(1.6rem,6vw,2.8rem);color:#ffd6e7;}
.map-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-bottom:.3rem;}
#plane{position:absolute;font-size:2rem;z-index:10;
  transform:translate(-50%,-50%);pointer-events:none;
  filter:drop-shadow(0 0 14px rgba(255,200,220,.9));}
#flight-status{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.16em;
  text-transform:uppercase;z-index:5;white-space:nowrap;}

/* ── SCREEN 3: RAIN + MESSAGE ── */
#s3{background:linear-gradient(160deg,#fff0f4,#fde4ec,#f9cdd8);flex-direction:column;}
#hearts-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
.s3-inner{position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.8rem;
  padding:2rem 1.5rem;width:100%;min-height:100vh;}
.love-display{
  font-family:'Sacramento',cursive;
  font-size:clamp(2.2rem,9vw,4.5rem);
  color:#c45c78;text-align:center;line-height:1.3;
  text-shadow:0 2px 20px rgba(196,92,120,.3);
  cursor:pointer;padding:1.5rem;
  transition:transform .12s;
  min-height:4em;display:flex;align-items:center;justify-content:center;
  max-width:90vw;
  -webkit-tap-highlight-color:transparent;
}
.love-display:active{transform:scale(.96);}
.tap-love-hint{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:#e8839a;opacity:.8;animation:pulse 2s ease-in-out infinite;}
.music-row{display:flex;align-items:center;gap:.9rem;}
.music-btn{
  background:linear-gradient(135deg,#e8839a,#c45c78);
  border:none;color:white;width:50px;height:50px;border-radius:50%;
  font-size:1.2rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(196,92,120,.4);
  transition:transform .2s;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.music-btn:active{transform:scale(.93);}
.music-label{font-size:.68rem;letter-spacing:.1em;color:#c45c78;opacity:.75;}

/* FLOAT */
.float-h{position:fixed;pointer-events:none;z-index:999;animation:floatUp 2.5s ease forwards;}
.burst-el{position:fixed;pointer-events:none;z-index:998;
  transform:translate(-50%,-50%);animation:burstAnim 1.3s ease forwards;}

@keyframes hb{0%,100%{transform:scale(1)}40%{transform:scale(1.13)}70%{transform:scale(1.06)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-200px) scale(.4)}}
@keyframes burstAnim{
  0%{opacity:1;font-size:2rem;transform:translate(-50%,-50%) scale(.3)}
  50%{opacity:1;font-size:4rem;transform:translate(-50%,-50%) scale(1.4)}
  100%{opacity:0;font-size:5rem;transform:translate(-50%,-50%) scale(2)}
}
</style>
</head>
<body>

<!-- S1: HEART -->
<div class="screen active" id="s1">
  <canvas id="petals-canvas"></canvas>
  <div class="s1-inner">
    <div class="title-script">Аришенька</div>
    <button class="heart-btn" id="heart-btn" onclick="startFlight()">❤️</button>
    <div class="tap-hint">нажми на сердечко</div>
  </div>
</div>

<!-- S2: MAP -->
<div class="screen" id="s2">
  <canvas id="map-canvas"></canvas>
  <div class="map-header">
    <div class="map-label">маршрут любви</div>
    <div class="map-route">Santa Severa ✈️ Павлоград</div>
  </div>
  <div id="plane">✈️</div>
  <div id="flight-status">готовимся к взлёту...</div>
</div>

<!-- S3: RAIN + MESSAGE -->
<div class="screen" id="s3">
  <canvas id="hearts-canvas"></canvas>
  <div class="s3-inner">
    <div class="love-display" id="love-display" onclick="addLove()">
      я тебя люблю ❤️
    </div>
    <div class="tap-love-hint">нажимай чтобы добавить любви</div>
    <div class="music-row">
      <button class="music-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
      <span class="music-label">Can't Take My Eyes Off You</span>
    </div>
  </div>
</div>

<!-- SOUNDCLOUD -->
<iframe id="sc-iframe"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/frankievalli/cant-take-my-eyes-off-you&color=%23e8839a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_teaser=false"
  style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;"
  allow="autoplay">
</iframe>
<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
// ══ PETALS ══
const petC=document.getElementById('petals-canvas');
const petX=petC.getContext('2d');
let petals=[];
function resP(){petC.width=innerWidth;petC.height=innerHeight;}
resP();addEventListener('resize',resP);
function mkP(){
  return{x:Math.random()*petC.width,y:-20,sz:7+Math.random()*12,
    sy:.7+Math.random()*1.3,sx:(Math.random()-.5)*.8,
    rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.04,
    op:.35+Math.random()*.5,
    col:['#f7c5d0','#e8839a','#ffdde6','#f9aec0','#fce4ec'][0|Math.random()*5]};
}
for(let i=0;i<28;i++){const p=mkP();p.y=Math.random()*innerHeight;petals.push(p);}
function animP(){
  petX.clearRect(0,0,petC.width,petC.height);
  petals.forEach(p=>{
    p.y+=p.sy;p.x+=p.sx+Math.sin(p.y*.02)*.5;p.rot+=p.rs;
    if(p.y>petC.height+20)Object.assign(p,mkP());
    petX.save();petX.translate(p.x,p.y);petX.rotate(p.rot);
    petX.globalAlpha=p.op;petX.fillStyle=p.col;
    petX.beginPath();petX.ellipse(0,0,p.sz/2,p.sz,0,0,Math.PI*2);
    petX.fill();petX.restore();
  });
  requestAnimationFrame(animP);
}
animP();

// ══ SCREEN ══
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══ FLOATERS ══
function spawnF(x,y,n){
  const em=['❤️','🩷','💕','💗','🌸','✨','💖'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='float-h';
      el.textContent=em[0|Math.random()*em.length];
      el.style.cssText=`left:${x-12+(Math.random()-.5)*60}px;top:${y-12}px;font-size:${.8+Math.random()*1.2}rem`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    },i*65);
  }
}

// ══ MAP ══
const mC=document.getElementById('map-canvas');
const mX=mC.getContext('2d');
const plane=document.getElementById('plane');
const fStat=document.getElementById('flight-status');

// Normalized map coords (equirectangular approx)
// Santa Severa, Italy ~42°N 12°E  → x=0.533, y=0.384
// Pavlograd, Ukraine ~48.5°N 35.9°E → x=0.600, y=0.347
const FROM={x:.533,y:.384};
const TO={x:.600,y:.347};

function resM(){mC.width=innerWidth;mC.height=innerHeight;}
resM();addEventListener('resize',()=>{if(document.getElementById('s2').classList.contains('active'))drawMap();});

function drawMap(trail,t){
  const W=mC.width,H=mC.height;
  mX.clearRect(0,0,W,H);

  // Sky gradient
  const sky=mX.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d1b2a');sky.addColorStop(1,'#1a3a5c');
  mX.fillStyle=sky;mX.fillRect(0,0,W,H);

  // Stars
  mX.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<80;i++){
    mX.beginPath();
    mX.arc((i*137.5%1)*W,(i*97.3%1)*H,.8+Math.random()*.6,0,Math.PI*2);
    mX.fill();
  }

  // Grid
  mX.strokeStyle='rgba(100,150,255,.1)';mX.lineWidth=.8;
  for(let i=0;i<=12;i++){const x=W*i/12;mX.beginPath();mX.moveTo(x,0);mX.lineTo(x,H);mX.stroke();}
  for(let i=0;i<=8;i++){const y=H*i/8;mX.beginPath();mX.moveTo(0,y);mX.lineTo(W,y);mX.stroke();}

  // Continents (simplified shapes)
  // Western Europe
  mX.fillStyle='#1e5631';
  poly(mX,W,H,[[.44,.27],[.46,.24],[.51,.25],[.55,.27],[.57,.31],[.55,.35],[.52,.38],[.48,.39],[.45,.37],[.43,.33]]);

  // Eastern Europe + Ukraine
  mX.fillStyle='#256b3a';
  poly(mX,W,H,[[.55,.27],[.62,.26],[.67,.29],[.68,.34],[.64,.37],[.60,.37],[.56,.34],[.55,.30]]);

  // Russia / west
  mX.fillStyle='#1a5228';
  poly(mX,W,H,[[.62,.26],[.72,.22],[.76,.28],[.72,.34],[.67,.33],[.64,.29]]);

  // Italy peninsula
  mX.fillStyle='#2d7a3a';
  poly(mX,W,H,[[.51,.33],[.53,.35],[.535,.41],[.525,.43],[.515,.40],[.508,.35]]);

  // North Africa
  mX.fillStyle='#8b6914';
  poly(mX,W,H,[[.43,.43],[.68,.43],[.68,.54],[.43,.54]]);

  // Mediterranean
  mX.fillStyle='#143050';
  poly(mX,W,H,[[.44,.38],[.57,.38],[.57,.43],[.44,.43]]);

  // City markers
  const fx=FROM.x*W, fy=FROM.y*H;
  const tx=TO.x*W,   ty=TO.y*H;

  // Glow FROM
  const gF=mX.createRadialGradient(fx,fy,0,fx,fy,18);
  gF.addColorStop(0,'rgba(255,150,180,.6)');gF.addColorStop(1,'transparent');
  mX.fillStyle=gF;mX.beginPath();mX.arc(fx,fy,18,0,Math.PI*2);mX.fill();
  mX.fillStyle='#ffb3c6';mX.beginPath();mX.arc(fx,fy,5,0,Math.PI*2);mX.fill();

  // Glow TO
  const gT=mX.createRadialGradient(tx,ty,0,tx,ty,18);
  gT.addColorStop(0,'rgba(255,150,180,.6)');gT.addColorStop(1,'transparent');
  mX.fillStyle=gT;mX.beginPath();mX.arc(tx,ty,18,0,Math.PI*2);mX.fill();
  mX.fillStyle='#ffb3c6';mX.beginPath();mX.arc(tx,ty,5,0,Math.PI*2);mX.fill();

  // Labels
  const fs=Math.max(11,W*.018);
  mX.font=`${fs}px 'Montserrat',sans-serif`;mX.fillStyle='white';
  mX.fillText('🇮🇹 Santa Severa',fx+10,fy-10);
  mX.fillText('🇺🇦 Павлоград',tx+10,ty-10);

  // Trail
  if(trail&&trail.length>1){
    mX.strokeStyle='rgba(255,182,200,.55)';mX.lineWidth=2;mX.setLineDash([6,5]);
    mX.beginPath();
    trail.forEach((p,i)=>i?mX.lineTo(p.x,p.y):mX.moveTo(p.x,p.y));
    mX.stroke();mX.setLineDash([]);
  }

  // Destination pulse
  if(t!==undefined){
    const pulse=((t*4)%1)*28;
    mX.strokeStyle=`rgba(255,150,170,${.5*(1-pulse/28)})`;
    mX.lineWidth=2;
    mX.beginPath();mX.arc(tx,ty,pulse,0,Math.PI*2);mX.stroke();
  }
}

function poly(ctx,W,H,pts){
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i?ctx.lineTo(x*W,y*H):ctx.moveTo(x*W,y*H));
  ctx.closePath();ctx.fill();
}

function eio(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

let flightT=0,flightAnim=null,trail=[];

function animFlight(){
  if(flightT>1){
    clearInterval(flightAnim);
    fStat.textContent='приземлились в Павлограде 💕';
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='burst-el';el.textContent='💖';
      el.style.cssText=`left:50%;top:50%;font-size:2rem;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1400);
      spawnF(innerWidth/2,innerHeight/2,18);
      setTimeout(()=>showScreen('s3'),1900);
    },500);
    return;
  }

  const W=mC.width,H=mC.height;
  const t=eio(Math.min(flightT,1));
  const fx=FROM.x*W,fy=FROM.y*H,tx=TO.x*W,ty=TO.y*H;
  const cx=(fx+tx)/2, cy=Math.min(fy,ty)-H*.22;

  const bx=(1-t)*(1-t)*fx+2*(1-t)*t*cx+t*t*tx;
  const by=(1-t)*(1-t)*fy+2*(1-t)*t*cy+t*t*ty;
  trail.push({x:bx,y:by});

  drawMap(trail,flightT);

  let angle=0;
  if(trail.length>1){
    const prev=trail[trail.length-2];
    angle=Math.atan2(by-prev.y,bx-prev.x);
  }
  plane.style.left=bx+'px';
  plane.style.top=by+'px';
  plane.style.transform=`translate(-50%,-50%) rotate(${angle}rad)`;

  const pct=Math.floor(t*100);
  if(pct<20) fStat.textContent='взлетаем... 🛫';
  else if(pct<45) fStat.textContent='пролетаем Апеннины ✈️';
  else if(pct<65) fStat.textContent='над Средиземным морем 🌊';
  else if(pct<85) fStat.textContent='пересекаем Украину 💙💛';
  else fStat.textContent='снижаемся... уже скоро 🌸';

  flightT+=.004;
}

function startFlight(){
  const hb=document.getElementById('heart-btn').getBoundingClientRect();
  spawnF(hb.left+hb.width/2,hb.top+hb.height/2,10);
  showScreen('s2');
  trail=[];flightT=0;
  resM();drawMap([],0);
  plane.style.left=(FROM.x*mC.width)+'px';
  plane.style.top=(FROM.y*mC.height)+'px';
  plane.style.transform='translate(-50%,-50%)';
  fStat.textContent='готовимся к взлёту...';
  setTimeout(()=>{ flightAnim=setInterval(animFlight,16); },700);
}

// ══ HEARTS RAIN ══
const hC=document.getElementById('hearts-canvas');
const hX=hC.getContext('2d');
let rainH=[],rainOn=false;
function resH(){hC.width=innerWidth;hC.height=innerHeight;}
resH();addEventListener('resize',resH);

function mkRH(){
  const em=['❤️','💕','💗','🩷','💖','💝'];
  return{x:Math.random()*hC.width,y:-35,
    sz:.9+Math.random()*1.5,speed:1.8+Math.random()*2.8,
    wb:Math.random()*Math.PI*2,ws:.018+Math.random()*.025,
    em:em[0|Math.random()*em.length],op:.65+Math.random()*.35};
}

let spawnTimer=null;
function spawnRain(){
  rainH.push(mkRH());
  if(rainH.length<100){
    spawnTimer=setTimeout(spawnRain,70);
  } else {
    setInterval(()=>rainH.push(mkRH()),100);
  }
}

function animRain(){
  hX.clearRect(0,0,hC.width,hC.height);
  hX.font='28px serif';
  rainH.forEach(h=>{
    h.y+=h.speed;h.wb+=h.ws;h.x+=Math.sin(h.wb)*.7;
    hX.globalAlpha=h.op;
    hX.font=`${(h.sz*28)|0}px serif`;
    hX.fillText(h.em,h.x,h.y);
  });
  hX.globalAlpha=1;
  rainH=rainH.filter(h=>h.y<hC.height+50);
  if(rainOn)requestAnimationFrame(animRain);
}

const s3el=document.getElementById('s3');
const obs=new MutationObserver(()=>{
  if(s3el.classList.contains('active')&&!rainOn){
    rainOn=true;
    animRain();
    spawnRain();
  }
});
obs.observe(s3el,{attributes:true,attributeFilter:['class']});

// ══ LOVE PHRASES ══
const phrases=[
  'я тебя люблю ❤️',
  'я тебя люблю безумно 💕',
  'я тебя люблю безумно сильно 💗',
  'я тебя люблю безумно сильно при сильно 💖',
  'я тебя люблю безумно сильно при сильно\nмое солнышко 🌸',
  'я тебя люблю безумно сильно при сильно\nмое солнышко малыш 💝',
  'я тебя люблю безумно сильно при сильно\nмое солнышко малыш навсегда 🥰',
  'ты мой весь мир\nлюблю тебя без конца\nнавсегда и всегда ❤️💕💖🌸',
];
let lIdx=0;

function addLove(){
  lIdx=Math.min(lIdx+1,phrases.length-1);
  const d=document.getElementById('love-display');
  d.style.transform='scale(.95)';
  setTimeout(()=>{
    d.style.transform='';
    d.innerHTML=phrases[lIdx].replace(/\n/g,'<br>');
  },100);
  const r=d.getBoundingClientRect();
  spawnF(r.left+r.width/2,r.top+r.height/2,6);
}

// ══ MUSIC ══
let playing=false,scW=null;
window.addEventListener('load',()=>{
  try{
    scW=SC.Widget(document.getElementById('sc-iframe'));
    scW.bind(SC.Widget.Events.READY,()=>scW.setVolume(70));
  }catch(e){}
});

function toggleMusic(){
  const btn=document.getElementById('music-btn');
  if(!scW){btn.textContent='⚠️';return;}
  if(playing){scW.pause();btn.textContent='🎵';playing=false;}
  else{scW.play();btn.textContent='🎶';playing=true;}
}
</script>
</body>
</html>

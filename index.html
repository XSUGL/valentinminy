<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аришенька 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 1s cubic-bezier(.4,0,.2,1);z-index:10;}
.screen.active{opacity:1;pointer-events:all;}

/* ══════════════════════
   S1 — HEART
══════════════════════ */
#s1{
  background:linear-gradient(145deg,#1a0810 0%,#2d1020 40%,#1a0810 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#petal-c{position:absolute;inset:0;pointer-events:none;}

/* Ambient glow behind heart */
.glow-orb{
  position:absolute;width:60vw;height:60vw;max-width:400px;max-height:400px;
  border-radius:50%;z-index:0;
  background:radial-gradient(circle,rgba(232,80,120,.18) 0%,transparent 70%);
  animation:orbPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}

.s1-inner{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:2.2rem;}

.arisha-title{
  font-family:'Sacramento',cursive;
  font-size:clamp(3.5rem,14vw,6.5rem);
  background:linear-gradient(135deg,#ff8fab,#ff4d6d,#c9184a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,77,109,.4));
  line-height:1;animation:slideDown .9s cubic-bezier(.2,1,.3,1) both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* HEART BTN */
.heart-wrap{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:fadeUp .9s .2s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.ripple{position:absolute;border-radius:50%;border:1.5px solid rgba(255,77,109,.4);animation:rip 2.4s ease-out infinite;}
.ripple:nth-child(1){width:130px;height:130px;}
.ripple:nth-child(2){width:160px;height:160px;animation-delay:.6s;}
.ripple:nth-child(3){width:200px;height:200px;animation-delay:1.2s;}
@keyframes rip{0%{transform:scale(.7);opacity:.8}100%{transform:scale(1.2);opacity:0}}

.heart-btn{
  background:none;border:none;cursor:pointer;display:block;
  animation:hbeat 1.8s ease-in-out infinite;
  filter:drop-shadow(0 0 24px rgba(255,77,109,.6)) drop-shadow(0 12px 40px rgba(255,77,109,.3));
  transition:filter .15s;z-index:2;position:relative;
}
.heart-btn:active{filter:drop-shadow(0 0 40px rgba(255,77,109,.9));}
.heart-svg{width:clamp(110px,30vw,170px);height:auto;display:block;}
@keyframes hbeat{0%,100%{transform:scale(1)}35%{transform:scale(1.08)}65%{transform:scale(1.04)}}

.tap-hint{
  font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:#ff8fab;
  animation:fadeUp .9s .4s both, breathe 2.5s 1.4s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:.9}}

/* ══════════════════════
   S2 — MAP FLIGHT
══════════════════════ */
#s2{background:#0d1520;}
#map{position:absolute;inset:0;z-index:1;}

/* Top fade */
.map-top-bar{
  position:absolute;top:0;left:0;right:0;z-index:500;pointer-events:none;
  background:linear-gradient(180deg,rgba(10,15,25,.9) 0%,transparent 100%);
  padding:1.2rem 1.5rem 3rem;
  display:flex;flex-direction:column;align-items:center;gap:.35rem;
}
.flight-label{font-family:'Montserrat',sans-serif;font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.4);}
.flight-cities{
  font-family:'Sacramento',cursive;font-size:clamp(1.8rem,7vw,3rem);
  background:linear-gradient(90deg,#ffb3c6,#ff8fab,#ff4d6d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 12px rgba(255,77,109,.3));
}

/* Phase indicator */
.phase-indicator{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;pointer-events:none;
  font-family:'Sacramento',cursive;font-size:clamp(2rem,8vw,3.5rem);
  color:white;text-shadow:0 0 20px rgba(255,100,150,.6);
  opacity:0;transition:opacity .5s ease;text-align:center;
}
.phase-indicator.show{opacity:1;}

/* Bottom bar */
.map-bottom-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:500;pointer-events:none;
  background:linear-gradient(0deg,rgba(10,15,25,.9) 0%,transparent 100%);
  padding:3rem 2rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;gap:.7rem;
}
.prog-wrap{width:min(300px,78vw);display:flex;flex-direction:column;gap:.4rem;}
.prog-track{height:2px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;width:0%;
  background:linear-gradient(90deg,#c9184a,#ff4d6d,#ff8fab);
  transition:width .12s linear;box-shadow:0 0 8px rgba(255,77,109,.5);}
#status-txt{
  font-family:'Montserrat',sans-serif;font-size:.62rem;letter-spacing:.16em;
  text-transform:uppercase;color:rgba(255,255,255,.45);text-align:center;
}

/* PLANE */
#plane-el{
  position:absolute;z-index:600;pointer-events:none;
  transform:translate(-50%,-50%);will-change:left,top,transform;
  transition:opacity .3s;
}
.plane-svg{width:clamp(40px,9vw,58px);height:auto;display:block;}

/* City pin */
.cpin{
  background:rgba(255,77,109,.9);
  border:1.5px solid rgba(255,255,255,.3);
  border-radius:20px;padding:.22rem .65rem;
  font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:400;color:white;
  white-space:nowrap;box-shadow:0 2px 16px rgba(255,77,109,.5);
  backdrop-filter:blur(4px);
}

/* ══════════════════════
   S3 — RAIN + LOVE
══════════════════════ */
#s3{
  background:linear-gradient(145deg,#1a0810 0%,#2d1020 50%,#1a0810 100%);
  display:flex;align-items:center;justify-content:center;
}
#rain-c{position:absolute;inset:0;pointer-events:none;z-index:0;}
.s3-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2rem;padding:2rem 1.5rem;width:100%;min-height:100vh;
}

/* Love card */
.love-card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,77,109,.2);
  border-radius:28px;padding:2.2rem 2rem;
  max-width:min(440px,90vw);width:100%;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 8px 48px rgba(255,77,109,.1),inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .12s,box-shadow .12s;
}
.love-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,77,109,.08) 0%,transparent 70%);
  pointer-events:none;
}
.love-card:active{transform:scale(.97);box-shadow:0 4px 24px rgba(255,77,109,.08);}

.love-text{
  font-family:'Sacramento',cursive;
  font-size:clamp(2.2rem,9vw,3.6rem);
  background:linear-gradient(135deg,#ff8fab,#ff4d6d,#c9184a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.35;
  min-height:2.7em;display:flex;align-items:center;justify-content:center;
  transition:opacity .18s;filter:drop-shadow(0 0 20px rgba(255,77,109,.3));
}

.tap-love{
  font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:#ff8fab;
  animation:breathe 2.2s ease-in-out infinite;
}

/* Music pill */
.music-pill{
  display:flex;align-items:center;gap:1rem;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,77,109,.15);
  border-radius:50px;padding:.65rem 1.4rem .65rem .65rem;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.mbtn{
  background:linear-gradient(135deg,#ff4d6d,#c9184a);
  border:none;color:white;width:44px;height:44px;border-radius:50%;
  font-size:1.1rem;cursor:pointer;
  box-shadow:0 3px 16px rgba(255,77,109,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
}
.mbtn:active{transform:scale(.9);}
.mbtn.playing{box-shadow:0 0 0 3px rgba(255,77,109,.3),0 3px 16px rgba(255,77,109,.4);}
.minfo{display:flex;flex-direction:column;gap:.1rem;}
.mtrack{font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:500;color:#ff8fab;letter-spacing:.04em;}
.martist{font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:300;color:rgba(255,139,171,.55);letter-spacing:.04em;}

/* FLOATERS */
.floater{position:fixed;pointer-events:none;z-index:9999;animation:floatUp 3s cubic-bezier(.2,1,.3,1) forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-240px) scale(.3) rotate(15deg)}}

.burst-el{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);animation:burstGo 1.5s cubic-bezier(.2,1,.3,1) forwards;}
@keyframes burstGo{0%{opacity:0;transform:translate(-50%,-50%) scale(.1)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.5)}}
</style>
</head>
<body>

<!-- ══ S1: HEART ══ -->
<div class="screen active" id="s1">
  <canvas id="petal-c"></canvas>
  <div class="glow-orb"></div>
  <div class="s1-inner">
    <div class="arisha-title">Аришенька</div>
    <div class="heart-wrap" onclick="startFlight()" style="position:relative;z-index:6;cursor:pointer;">
      <div class="ripple" style="pointer-events:none;"></div>
      <div class="ripple" style="pointer-events:none;"></div>
      <div class="ripple" style="pointer-events:none;"></div>
      <button class="heart-btn" style="position:relative;z-index:7;" onclick="startFlight()" aria-label="Открыть валентинку">
        <svg class="heart-svg" viewBox="0 0 100 92" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="hg" cx="50%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#ff8fab"/>
              <stop offset="45%" stop-color="#ff4d6d"/>
              <stop offset="100%" stop-color="#a4133c"/>
            </radialGradient>
            <radialGradient id="hg2" cx="50%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#ffb3c6" stop-opacity=".5"/>
              <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
            </radialGradient>
            <filter id="hf" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
              <feFlood flood-color="#ff4d6d" flood-opacity=".4" result="color"/>
              <feComposite in="color" in2="blur" operator="in" result="shadow"/>
              <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <path fill="url(#hg)" filter="url(#hf)"
            d="M50 88 C50 88 4 57 4 27 C4 12 15 3 28 3 C37 3 44 8 50 17 C56 8 63 3 72 3 C85 3 96 12 96 27 C96 57 50 88 50 88Z"/>
          <path fill="url(#hg2)"
            d="M50 88 C50 88 4 57 4 27 C4 12 15 3 28 3 C37 3 44 8 50 17 C56 8 63 3 72 3 C85 3 96 12 96 27 C96 57 50 88 50 88Z"/>
          <!-- shine -->
          <ellipse cx="34" cy="20" rx="12" ry="7" fill="rgba(255,255,255,.3)" transform="rotate(-30,34,20)"/>
          <ellipse cx="30" cy="14" rx="5" ry="3" fill="rgba(255,255,255,.5)" transform="rotate(-30,30,14)"/>
        </svg>
      </button>
    </div>
    <div class="tap-hint">нажми на сердечко</div>
  </div>
</div>

<!-- ══ S2: MAP ══ -->
<div class="screen" id="s2">
  <div id="map"></div>

  <div class="map-top-bar">
    <div class="flight-label">маршрут любви</div>
    <div class="flight-cities">Santa Severa ✈ Павлоград</div>
  </div>

  <div class="phase-indicator" id="phase-ind"></div>

  <!-- Plane -->
  <div id="plane-el">
    <svg class="plane-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#ffd6e7"/>
        </linearGradient>
        <filter id="pglow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- fuselage -->
      <path fill="url(#pg)" filter="url(#pglow)"
        d="M10 36 L58 22 C63 20 66 23 64 28 L54 43 C52 46 49 47 46 45 L33 39 L22 52 L17 50 L24 36 Z"/>
      <!-- main wing -->
      <path fill="rgba(255,230,238,.9)"
        d="M22 36 L42 29 L47 36 L32 41 Z"/>
      <!-- tail wing -->
      <path fill="rgba(255,200,220,.8)"
        d="M10 36 L17 31 L21 36 L17 41 Z"/>
      <!-- small tail fin -->
      <path fill="rgba(255,210,225,.7)"
        d="M12 36 L18 28 L21 30 L17 36Z"/>
      <!-- window -->
      <circle cx="44" cy="34" r="3" fill="rgba(255,180,210,.95)"/>
      <circle cx="44" cy="34" r="1.5" fill="rgba(255,255,255,.7)"/>
      <!-- engine -->
      <ellipse cx="48" cy="41" rx="5" ry="2.2" fill="rgba(255,150,180,.45)"/>
      <!-- exhaust glow -->
      <ellipse cx="53" cy="41" rx="3" ry="1.2" fill="rgba(255,180,200,.25)"/>
    </svg>
  </div>

  <div class="map-bottom-bar">
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
    </div>
    <div id="status-txt">готовимся к взлёту...</div>
  </div>
</div>

<!-- ══ S3: HEARTS + LOVE ══ -->
<div class="screen" id="s3">
  <canvas id="rain-c"></canvas>
  <div class="s3-inner">

    <div class="love-card" id="love-card" onclick="addLove()">
      <div class="love-text" id="love-txt">я тебя люблю ❤️</div>
    </div>

    <div class="tap-love">нажимай — добавляй любви</div>

    <div class="music-pill">
      <button class="mbtn" id="mbtn" onclick="toggleMusic()">🎵</button>
      <div class="minfo">
        <span class="mtrack">Can't Take My Eyes Off You</span>
        <span class="martist">Frankie Valli</span>
      </div>
    </div>

  </div>
</div>

<!-- SOUNDCLOUD — official Frankie Valli channel -->
<iframe id="sc"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/frankievallithefourseasons/cant-take-my-eyes-off-you&color=%23ff4d6d&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_teaser=false&buying=false&sharing=false&download=false"
  style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;"
  allow="autoplay">
</iframe>

<script>
'use strict';

// ══════════════════════════════════
// PETALS
// ══════════════════════════════════
const pc=document.getElementById('petal-c');
const px=pc.getContext('2d');
function rsPC(){pc.width=innerWidth;pc.height=innerHeight;}
rsPC();addEventListener('resize',rsPC);
const ptls=[];
function mkPt(){return{x:Math.random()*pc.width,y:-20,sz:5+Math.random()*13,
  sy:.5+Math.random()*1.3,sx:(Math.random()-.5)*.9,
  rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.04,
  op:.2+Math.random()*.5,
  col:['#ff8fab','#ffb3c6','#ff4d6d','#ffc2d1','#ff85a1'][0|Math.random()*5]};}
for(let i=0;i<30;i++){const p=mkPt();p.y=Math.random()*innerHeight;ptls.push(p);}
(function aPet(){
  px.clearRect(0,0,pc.width,pc.height);
  ptls.forEach(p=>{
    p.y+=p.sy;p.x+=p.sx+Math.sin(p.y*.018)*.55;p.rot+=p.rs;
    if(p.y>pc.height+20)Object.assign(p,mkPt());
    px.save();px.translate(p.x,p.y);px.rotate(p.rot);
    px.globalAlpha=p.op;px.fillStyle=p.col;
    px.beginPath();px.ellipse(0,0,p.sz/2.2,p.sz,0,0,Math.PI*2);
    px.fill();px.restore();});
  requestAnimationFrame(aPet);
})();

// ══════════════════════════════════
// SCREEN MANAGER
// ══════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════
// FLOATERS
// ══════════════════════════════════
const EM=['❤️','🩷','💕','💗','🌸','✨','💖','💝','🫀'];
function spawnF(x,y,n,big){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='floater';
      const sz=big?(1.8+Math.random()*2.2):(.7+Math.random()*1.2);
      el.textContent=EM[0|Math.random()*EM.length];
      el.style.cssText=`left:${x+(Math.random()-.5)*90}px;top:${y+(Math.random()-.5)*50}px;font-size:${sz}rem`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3100);
    },i*50);
  }
}
function burst(x,y){
  const el=document.createElement('div');
  el.className='burst-el';el.textContent='💖';
  el.style.cssText=`left:${x}px;top:${y}px;font-size:2.5rem`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// ══════════════════════════════════
// MAP & CINEMATIC FLIGHT
// ══════════════════════════════════
const FROM={lat:42.044,lng:11.951,name:'Santa Severa 🇮🇹'};
const TO  ={lat:48.537,lng:35.870,name:'Павлоград 🇺🇦'};

let map=null,trailPoly=null,planeEl=null;
let rafId=null,flightPhase='idle';
let trailPts=[];
let mapReady=false;

// Cinematic phases:
// 0. zoom in Santa Severa (zoom 10→12, 2s)
// 1. zoom out to see both cities (zoom 12→5, 2s)
// 2. fly (animate plane + trail, ~18s)
// 3. zoom in Pavlograd (zoom 5→13, 2.5s)
// 4. landing burst → go to s3

function initMap(){
  if(mapReady)return;
  mapReady=true;

  map=L.map('map',{
    zoomControl:false,attributionControl:false,
    dragging:false,scrollWheelZoom:false,
    doubleClickZoom:false,touchZoom:false,keyboard:false,
    zoomAnimation:true,fadeAnimation:true,
  });

  // Dark Carto — no labels for clean look
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19,
  }).addTo(map);

  // Subtle label overlay
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19,opacity:.4,
  }).addTo(map);

  // Pink glow tiles to tint the map
  map.getContainer().style.filter='hue-rotate(300deg) saturate(1.3) brightness(0.9)';

  // Trail line
  trailPoly=L.polyline([],{color:'#ff8fab',weight:2.5,opacity:.75,dashArray:'7 5'}).addTo(map);

  // City markers
  const pin=label=>L.divIcon({className:'',html:`<div class="cpin">${label}</div>`,iconAnchor:[0,12]});
  L.marker([FROM.lat,FROM.lng],{icon:pin(FROM.name)}).addTo(map);
  L.marker([TO.lat,TO.lng],  {icon:pin(TO.name)}).addTo(map);

  planeEl=document.getElementById('plane-el');
}

// Great-circle arc interpolation (t: 0→1)
function arcPoint(t){
  const lat=FROM.lat+(TO.lat-FROM.lat)*t;
  const lng=FROM.lng+(TO.lng-FROM.lng)*t;
  const arc=Math.sin(t*Math.PI)*7; // arc height in degrees
  return[lat+arc, lng];
}

function eio(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function showPhaseText(txt,dur){
  const el=document.getElementById('phase-ind');
  el.textContent=txt;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur||1800);
}

// FLIGHT STATE
let ft=0; // 0→1 flight progress
let lastTs=0;
const FLIGHT_DURATION=16000; // ms total flight

const STATUSES=[
  [0,'взлетаем из Santa Severa... 🛫'],
  [.15,'Апеннинские горы внизу ⛰️'],
  [.3,'Адриатическое море 🌊'],
  [.48,'пролетаем над Балканами...'],
  [.62,'входим в Украину 💙💛'],
  [.78,'Днепропетровская область 🌻'],
  [.9,'Павлоград всё ближе... 🌸'],
  [.97,'снижаемся... 💕'],
];
function getStatus(t){
  let s=STATUSES[0][1];
  for(const[th,tx]of STATUSES)if(t>=th)s=tx;
  return s;
}

// ── CINEMATIC SEQUENCE ──
async function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function runCinematic(){
  initMap();
  await sleep(100);

  // Phase 0: zoom in to Santa Severa
  showPhaseText('Santa Severa, Italia 🇮🇹');
  map.setView([FROM.lat,FROM.lng],12,{animate:false});
  await sleep(2200);

  // Phase 1: zoom out to see full route
  map.flyToBounds(
    L.latLngBounds([FROM.lat,FROM.lng],[TO.lat,TO.lng]),
    {padding:[90,90],duration:2,easeLinearity:.4}
  );
  await sleep(2400);

  // Phase 2: fly!
  planeEl.style.opacity='1';
  ft=0;lastTs=performance.now();
  document.getElementById('status-txt').textContent=STATUSES[0][1];

  await new Promise(resolve=>{
    function flyFrame(ts){
      const dt=ts-lastTs;lastTs=ts;
      ft=clamp(ft+dt/FLIGHT_DURATION,0,1);
      const t=eio(ft);

      const [lat,lng]=arcPoint(t);
      const pt=map.latLngToContainerPoint([lat,lng]);

      planeEl.style.left=pt.x+'px';
      planeEl.style.top=pt.y+'px';

      // rotation
      if(ft<.98){
        const t2=clamp(ft+.012,0,1);
        const [la2,ln2]=arcPoint(eio(t2));
        const pt2=map.latLngToContainerPoint([la2,ln2]);
        const ang=Math.atan2(pt2.y-pt.y,pt2.x-pt.x)*(180/Math.PI);
        planeEl.style.transform=`translate(-50%,-50%) rotate(${ang}deg)`;
      }

      // trail
      trailPts.push([lat,lng]);
      if(trailPts.length%2===0) trailPoly.setLatLngs(trailPts);

      // progress
      document.getElementById('prog').style.width=(t*100)+'%';
      document.getElementById('status-txt').textContent=getStatus(t);

      if(ft>=1){resolve();return;}
      rafId=requestAnimationFrame(flyFrame);
    }
    rafId=requestAnimationFrame(flyFrame);
  });

  // Phase 3: arrived — zoom into Pavlograd
  document.getElementById('status-txt').textContent='приземлились в Павлограде! 💕';
  document.getElementById('prog').style.width='100%';
  showPhaseText('Павлоград, Україна 🇺🇦 💕');

  map.flyTo([TO.lat,TO.lng],13,{duration:2.5,easeLinearity:.3});
  await sleep(1500);

  // Phase 4: burst & transition
  burst(innerWidth/2,innerHeight/2);
  spawnF(innerWidth/2,innerHeight/2,25,true);
  await sleep(1800);
  showScreen('s3');
}

function startFlight(){
  const hb=document.getElementById('heart-btn').getBoundingClientRect();
  spawnF(hb.left+hb.width/2,hb.top+hb.height/2,10);
  showScreen('s2');
  runCinematic();
}

// ══════════════════════════════════
// HEARTS RAIN (s3)
// ══════════════════════════════════
const rc=document.getElementById('rain-c');
const rx=rc.getContext('2d');
let rainOn=false,rain=[];
function rsRC(){rc.width=innerWidth;rc.height=innerHeight;}
rsRC();addEventListener('resize',rsRC);

function mkR(){return{
  x:Math.random()*rc.width,y:-35,
  sz:.8+Math.random()*1.7,speed:1.4+Math.random()*2.8,
  wb:Math.random()*Math.PI*2,ws:.014+Math.random()*.026,
  op:.5+Math.random()*.45,
  em:EM[0|Math.random()*EM.length]
};}

let rSpawn=0;
function spawnRain(){
  rain.push(mkR());rSpawn++;
  if(rainOn)setTimeout(spawnRain,rSpawn<70?60:105);
}

(function aRain(){
  if(rainOn){
    rx.clearRect(0,0,rc.width,rc.height);
    rain.forEach(h=>{
      h.y+=h.speed;h.wb+=h.ws;h.x+=Math.sin(h.wb)*.65;
      rx.globalAlpha=h.op;
      rx.font=`${(h.sz*26)|0}px serif`;
      rx.fillText(h.em,h.x,h.y);
    });
    rx.globalAlpha=1;
    rain=rain.filter(h=>h.y<rc.height+55);
  }
  requestAnimationFrame(aRain);
})();

const s3el=document.getElementById('s3');
new MutationObserver(()=>{
  if(s3el.classList.contains('active')&&!rainOn){
    rainOn=true;rSpawn=0;spawnRain();
  }
}).observe(s3el,{attributes:true,attributeFilter:['class']});

// MUSIC — official Frankie Valli SoundCloud
// ══════════════════════════════════
let playing=false,scW=null;
window.addEventListener('load',()=>{
  try{
    scW=SC.Widget(document.getElementById('sc'));
    scW.bind(SC.Widget.Events.READY,()=>{
      scW.setVolume(80);
      // seek to "I love you baby" part ~28s
      scW.seekTo(28000);
    });
  }catch(e){console.warn('SC:',e);}
});

function toggleMusic(){
  const btn=document.getElementById('mbtn');
  if(!scW)return;
  if(playing){
    scW.pause();
    btn.textContent='🎵';btn.classList.remove('playing');
    playing=false;
  }else{
    scW.play();
    btn.textContent='🎶';btn.classList.add('playing');
    playing=true;
  }
}
